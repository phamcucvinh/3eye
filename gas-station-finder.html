<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1km 반경 주유소 찾기</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: linear-gradient(135deg, #1e293b, #334155);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    z-index: 1000;
  }

  header h1 {
    font-size: 20px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  button {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(245,158,11,0.4); }
  button:active { transform: translateY(0); }

  button.secondary {
    background: linear-gradient(135deg, #475569, #334155);
  }

  button.secondary:hover { box-shadow: 0 4px 12px rgba(71,85,105,0.4); }

  .main-container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #map { flex: 1; min-height: 0; }

  .sidebar {
    width: 360px;
    background: #1e293b;
    overflow-y: auto;
    border-left: 1px solid #334155;
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 16px;
    background: #334155;
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .count-badge {
    background: #f59e0b;
    color: #000;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
  }

  .store-list { padding: 8px; flex: 1; }

  .store-card {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .store-card:hover {
    border-color: #f59e0b;
    background: #1a2744;
    transform: translateX(-2px);
  }

  .store-card .name {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .store-card .brand-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 600;
  }

  .brand-sk { background: #ef444422; color: #f87171; border: 1px solid #ef444444; }
  .brand-gs { background: #3b82f622; color: #60a5fa; border: 1px solid #3b82f644; }
  .brand-hyundai { background: #06b6d422; color: #22d3ee; border: 1px solid #06b6d444; }
  .brand-soil { background: #a855f722; color: #c084fc; border: 1px solid #a855f744; }
  .brand-default { background: #64748b22; color: #94a3b8; border: 1px solid #64748b44; }

  .store-card .meta {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .store-card .distance,
  .store-card .fuel-type {
    font-size: 13px;
    color: #94a3b8;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .store-card .address {
    font-size: 12px;
    color: #64748b;
    margin-top: 4px;
  }

  .store-card .hours {
    font-size: 12px;
    color: #4ade80;
    margin-top: 4px;
  }

  .status-bar {
    padding: 10px 16px;
    background: #334155;
    font-size: 13px;
    color: #94a3b8;
    text-align: center;
    border-top: 1px solid #475569;
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .loading-overlay.active { opacity: 1; pointer-events: auto; }

  .spinner {
    width: 48px; height: 48px;
    border: 4px solid #334155;
    border-top-color: #f59e0b;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: #64748b;
  }

  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  .leaflet-popup-content-wrapper {
    background: #1e293b !important;
    color: #e2e8f0 !important;
    border-radius: 10px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
  }

  .leaflet-popup-tip { background: #1e293b !important; }

  .leaflet-popup-content {
    margin: 12px 16px !important;
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif !important;
  }

  .popup-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .popup-dist { font-size: 13px; color: #94a3b8; }
  .popup-addr { font-size: 12px; color: #64748b; margin-top: 2px; }
  .popup-fuel { font-size: 12px; color: #fbbf24; margin-top: 2px; }
  .popup-hours { font-size: 12px; color: #4ade80; margin-top: 2px; }

  @media (max-width: 768px) {
    .main-container { flex-direction: column; }
    .sidebar { width: 100%; max-height: 40vh; border-left: none; border-top: 1px solid #334155; }
    header h1 { font-size: 16px; }
    button { padding: 8px 14px; font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <h1><span style="font-size:26px">⛽</span> 1km 반경 주유소 찾기</h1>
  <div class="controls">
    <button class="secondary" onclick="searchHere()">📍 지도 중심 검색</button>
    <button onclick="findMyLocation()">🧭 내 위치 검색</button>
  </div>
</header>

<div class="main-container">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <span>주유소 목록</span>
      <span class="count-badge" id="countBadge">0개</span>
    </div>
    <div class="store-list" id="storeList">
      <div class="empty-state">
        <div class="emoji">⛽</div>
        <p>지도를 클릭하거나<br><b>내 위치 검색</b> 버튼을 눌러<br>주변 주유소를 찾아보세요</p>
      </div>
    </div>
    <div class="status-bar" id="statusBar">지도를 클릭하면 해당 위치 기준으로 검색합니다</div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div style="text-align:center">
    <div class="spinner"></div>
    <div style="color:#e2e8f0;font-size:15px;">주유소 검색 중...</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const RADIUS = 1000;
let map, circle, centerMarker;
let storeMarkers = [];

map = L.map('map', { zoomControl: false }).setView([37.5665, 126.978], 15);
L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

map.on('click', e => searchAt(e.latlng.lat, e.latlng.lng));

function findMyLocation() {
  if (!navigator.geolocation) { alert('위치 서비스를 지원하지 않는 브라우저입니다.'); return; }
  showLoading(true);
  setStatus('현재 위치를 가져오는 중...');
  navigator.geolocation.getCurrentPosition(
    pos => searchAt(pos.coords.latitude, pos.coords.longitude),
    () => { showLoading(false); alert('위치를 가져올 수 없습니다.\n지도를 클릭하여 검색하세요.'); setStatus('위치 접근 실패'); },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function searchHere() {
  const c = map.getCenter();
  searchAt(c.lat, c.lng);
}

function searchAt(lat, lng) {
  showLoading(true);
  setStatus('주유소 검색 중...');
  clearMarkers();
  map.setView([lat, lng], 15);

  if (centerMarker) map.removeLayer(centerMarker);
  if (circle) map.removeLayer(circle);

  centerMarker = L.marker([lat, lng], {
    icon: L.divIcon({
      className: '',
      html: '<div style="width:20px;height:20px;background:#f59e0b;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.4);"></div>',
      iconSize: [20, 20], iconAnchor: [10, 10]
    })
  }).addTo(map).bindPopup('<div class="popup-name">검색 중심</div>');

  circle = L.circle([lat, lng], {
    radius: RADIUS,
    color: '#f59e0b',
    fillColor: '#f59e0b',
    fillOpacity: 0.08,
    weight: 2,
    dashArray: '6 4'
  }).addTo(map);

  fetchStations(lat, lng);
}

function fetchStations(lat, lng) {
  const query = `
    [out:json][timeout:15];
    (
      node["amenity"="fuel"](around:${RADIUS},${lat},${lng});
      way["amenity"="fuel"](around:${RADIUS},${lat},${lng});
    );
    out center body;
  `;

  fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST',
    body: 'data=' + encodeURIComponent(query)
  })
  .then(r => r.json())
  .then(data => {
    const stations = data.elements.map(el => {
      const t = el.tags;
      const elLat = el.lat || (el.center && el.center.lat);
      const elLng = el.lon || (el.center && el.center.lon);
      const name = t.name || t.brand || '주유소';
      const brand = t.brand || '';
      const addr = t['addr:full'] || t['addr:street'] || '';
      const fuels = [];
      if (t['fuel:diesel'] === 'yes') fuels.push('경유');
      if (t['fuel:octane_95'] === 'yes' || t['fuel:petrol'] === 'yes') fuels.push('휘발유');
      if (t['fuel:lpg'] === 'yes') fuels.push('LPG');
      const hours = t.opening_hours || '';
      const dist = haversine(lat, lng, elLat, elLng);
      return { lat: elLat, lng: elLng, name, brand, addr, fuels, hours, dist };
    });

    stations.sort((a, b) => a.dist - b.dist);
    renderStations(stations);
    showLoading(false);
    setStatus(`${stations.length}개 주유소 발견 (반경 1km)`);
  })
  .catch(() => {
    showLoading(false);
    setStatus('검색 실패 — 다시 시도하세요');
  });
}

function renderStations(stations) {
  const list = document.getElementById('storeList');
  document.getElementById('countBadge').textContent = stations.length + '개';

  if (stations.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">😢</div><p>반경 1km 내에<br>주유소를 찾지 못했습니다.<br>다른 위치를 클릭해보세요.</p></div>`;
    return;
  }

  list.innerHTML = '';

  stations.forEach((s, i) => {
    const brandClass = getBrandClass(s.brand || s.name);
    const brandLabel = getBrandLabel(s.brand || s.name);
    const distStr = s.dist < 1000 ? Math.round(s.dist) + 'm' : (s.dist / 1000).toFixed(1) + 'km';
    const fuelStr = s.fuels.length > 0 ? s.fuels.join(' · ') : '';

    const marker = L.marker([s.lat, s.lng], {
      icon: L.divIcon({
        className: '',
        html: `<div style="
          background:${getMarkerColor(s.brand || s.name)};
          color:#fff;width:30px;height:30px;border-radius:50%;
          display:flex;align-items:center;justify-content:center;
          font-size:14px;font-weight:700;
          border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);
        ">${i + 1}</div>`,
        iconSize: [30, 30], iconAnchor: [15, 15]
      })
    }).addTo(map);

    marker.bindPopup(`
      <div class="popup-name">${s.name}</div>
      <div class="popup-dist">📏 ${distStr}</div>
      ${fuelStr ? `<div class="popup-fuel">⛽ ${fuelStr}</div>` : ''}
      ${s.addr ? `<div class="popup-addr">📍 ${s.addr}</div>` : ''}
      ${s.hours ? `<div class="popup-hours">🕐 ${s.hours}</div>` : ''}
    `);

    storeMarkers.push(marker);

    const card = document.createElement('div');
    card.className = 'store-card';
    card.innerHTML = `
      <div class="name">
        <span>${i + 1}. ${s.name}</span>
        ${brandLabel ? `<span class="brand-tag ${brandClass}">${brandLabel}</span>` : ''}
      </div>
      <div class="meta">
        <div class="distance">📏 ${distStr}</div>
        ${fuelStr ? `<div class="fuel-type">⛽ ${fuelStr}</div>` : ''}
      </div>
      ${s.addr ? `<div class="address">📍 ${s.addr}</div>` : ''}
      ${s.hours ? `<div class="hours">🕐 ${s.hours}</div>` : ''}
    `;
    card.addEventListener('click', () => { map.setView([s.lat, s.lng], 17); marker.openPopup(); });
    list.appendChild(card);
  });
}

function getBrandClass(name) {
  const n = name.toLowerCase();
  if (n.includes('sk') || n.includes('에스케이')) return 'brand-sk';
  if (n.includes('gs') || n.includes('지에스')) return 'brand-gs';
  if (n.includes('hyundai') || n.includes('현대') || n.includes('오일뱅크')) return 'brand-hyundai';
  if (n.includes('s-oil') || n.includes('에쓰') || n.includes('에스오일')) return 'brand-soil';
  return 'brand-default';
}

function getBrandLabel(name) {
  const n = name.toLowerCase();
  if (n.includes('sk') || n.includes('에스케이')) return 'SK';
  if (n.includes('gs') || n.includes('지에스') || n.includes('caltex')) return 'GS칼텍스';
  if (n.includes('hyundai') || n.includes('현대') || n.includes('오일뱅크')) return '현대오일뱅크';
  if (n.includes('s-oil') || n.includes('에쓰') || n.includes('에스오일')) return 'S-OIL';
  return '';
}

function getMarkerColor(name) {
  const n = name.toLowerCase();
  if (n.includes('sk')) return '#ef4444';
  if (n.includes('gs') || n.includes('caltex')) return '#3b82f6';
  if (n.includes('hyundai') || n.includes('현대') || n.includes('오일뱅크')) return '#0891b2';
  if (n.includes('s-oil') || n.includes('에쓰') || n.includes('에스오일')) return '#a855f7';
  return '#64748b';
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function clearMarkers() { storeMarkers.forEach(m => map.removeLayer(m)); storeMarkers = []; }
function showLoading(show) { document.getElementById('loadingOverlay').classList.toggle('active', show); }
function setStatus(msg) { document.getElementById('statusBar').textContent = msg; }
</script>
</body>
</html>
