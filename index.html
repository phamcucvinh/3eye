<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3EYE - 주변 시설 찾기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    padding: 40px 20px;
  }
  h1 {
    font-size: 48px;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #3b82f6, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    color: #94a3b8;
    font-size: 18px;
    margin-bottom: 48px;
  }
  .cards {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
  }
  a.card {
    display: block;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 40px 36px;
    width: 280px;
    text-decoration: none;
    color: #e2e8f0;
    transition: all 0.3s;
  }
  a.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }
  a.card.blue:hover { border-color: #3b82f6; }
  a.card.amber:hover { border-color: #f59e0b; }
  a.card.purple:hover { border-color: #8b5cf6; }
  a.card.green:hover { border-color: #10b981; }
  .card .icon { font-size: 56px; margin-bottom: 16px; }
  .card .title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .card .desc { font-size: 14px; color: #94a3b8; line-height: 1.6; }
</style>
</head>
<body>
<div class="container">
  <h1>3EYE</h1>
  <p class="subtitle">주변 시설 찾기</p>
  <div class="cards">
    <a class="card blue" href="convenience-finder.html">
      <div class="icon">🏪</div>
      <div class="title">편의점 찾기</div>
      <div class="desc">CU, GS25, 세븐일레븐 등<br>주변 편의점을 한눈에</div>
    </a>
    <a class="card amber" href="gas-station-finder.html">
      <div class="icon">⛽</div>
      <div class="title">주유소 찾기</div>
      <div class="desc">SK, GS칼텍스, 현대오일뱅크 등<br>주변 주유소를 한눈에</div>
    </a>
    <a class="card purple" href="welfare-center-finder.html">
      <div class="icon">🏛️</div>
      <div class="title">사회복지관 찾기</div>
      <div class="desc">종합, 노인, 장애인, 아동 복지관 등<br>반경 5km 내 복지시설을 한눈에</div>
    </a>
    <a class="card green" href="sbwolgok/index.html">
      <div class="icon">🏠</div>
      <div class="title">월곡종합사회복지관</div>
      <div class="desc">성북구립 월곡종합사회복지관<br>소개 및 프로그램 안내</div>
    </a>
  </div>
</div>
</body>
</html>
